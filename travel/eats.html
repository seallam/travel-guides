<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f2eb;
  color: #333;
  padding-bottom: 80px;
}
.header {
  background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
  color: white;
  padding: 50px 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .sub { font-size: 13px; opacity: 0.8; margin-top: 4px; }
.header .loc { font-size: 12px; opacity: 0.7; margin-top: 6px; }
.container { max-width: 640px; margin: 0 auto; padding: 12px; }
.loading {
  text-align: center;
  padding: 60px 20px;
  color: #999;
}
.loading .spinner {
  width: 36px; height: 36px;
  border: 3px solid #ddd; border-top-color: #2d6a9f;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.card {
  background: white;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  display: flex;
  gap: 12px;
  transition: transform 0.15s;
  border-left: 4px solid #3c8dbc;
}
.card:active { transform: scale(0.98); }
.card .icon { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }
.card .info { flex: 1; min-width: 0; }
.card .name { font-size: 15px; font-weight: 700; }
.card .name small { font-weight: 400; font-size: 12px; color: #888; margin-left: 4px; }
.card .meta { font-size: 12px; color: #888; margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
.card .meta .dist { color: #2d6a9f; font-weight: 600; }
.card .tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.card .tags span {
  font-size: 11px; padding: 2px 8px; border-radius: 8px;
  background: #eef6fb; color: #2d6a9f;
}
.card .tags .durian { background: #edf3e4; color: #6b8c42; }
.card .tags .penang { background: #fdebd0; color: #a0670a; }
.card .tags .langkawi { background: #e8daf5; color: #5b2c8a; }
.card .price { font-size: 12px; color: #e67e22; font-weight: 600; margin-top: 3px; }
.filter-bar {
  display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto;
  background: white; border-bottom: 1px solid #eee;
  position: sticky; top: 96px; z-index: 9;
}
.filter-bar .btn {
  flex-shrink: 0; font-size: 13px; padding: 6px 14px; border-radius: 20px;
  border: 1px solid #ddd; background: white; color: #666;
  cursor: pointer; transition: all 0.2s;
}
.filter-bar .btn.active {
  background: #2d6a9f; color: white; border-color: #2d6a9f;
}
.footer {
  text-align: center; padding: 20px; font-size: 12px; color: #999;
}
</style>

// ====== 工具函数 ======
function deg2rad(d) { return d * Math.PI / 180; }

function distance(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = deg2rad(lat2 - lat1);
  var dLng = deg2rad(lng2 - lng1);
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
          Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ====== 主逻辑 ======
var userPos = null;
var currentFilter = "all";

function getCityFilter() {
  if (!userPos) return "all";
  // 根据坐标判断在哪个城市附近
  var dKL = distance(userPos[0], userPos[1], 3.148, 101.705);
  var dPN = distance(userPos[0], userPos[1], 5.414, 100.332);
  var dLGK = distance(userPos[0], userPos[1], 6.293, 99.727);
  var min = Math.min(dKL, dPN, dLGK);
  if (min < 50) {
    if (dKL === min) return "kl";
    if (dPN === min) return "penang";
    return "langkawi";
  }
  return "all";
}

function render() {
  var list = RESTAURANTS.filter(function(r) {
    return currentFilter === "all" || r.city === currentFilter;
  });

  list.forEach(function(r) {
    if (userPos) {
      r.dist = distance(userPos[0], userPos[1], r.coord[0], r.coord[1]);
    } else {
      r.dist = 999;
    }
  });

  // 有位置时按距离排序，否则按评分
  list.sort(function(a, b) {
    if (userPos) return a.dist - b.dist;
    return b.score - a.score;
  });

  var html = "";
  for (var i = 0; i < list.length; i++) {
    var r = list[i];
    var distText = userPos && r.dist < 100
      ? '<span class="dist">' + (r.dist < 1 ? (Math.round(r.dist*1000) + 'm') : (r.dist.toFixed(1) + 'km')) + '</span>'
      : '<span>' + r.cityName + '</span>';
    var cityLabel = {kl:"吉隆坡", penang:"槟城", langkawi:"兰卡威"}[r.city] || "";
    var tagHtml = r.tags.map(function(t) { return '<span>' + t + '</span>'; }).join("");

    html += '<div class="card">';
    html += '  <div class="icon">' + r.icon + '</div>';
    html += '  <div class="info">';
    html += '    <div class="name">' + r.name + ' <small>' + r.en + '</small></div>';
    html += '    <div class="meta"><span>' + cityLabel + '</span> · <span class="dist">' + distText + '</span> · <span>' + r.cat + '</span></div>';
    html += '    <div class="price">' + r.price + '</div>';
    html += '    <div class="tags">' + tagHtml + '</div>';
    html += '  </div>';
    html += '</div>';
  }

  if (list.length === 0) {
    html = '<div class="loading" style="padding:40px 20px;">该区域暂无收录的餐厅</div>';
  }

  document.getElementById("results").innerHTML = html;
}

// ====== 手动选择区域 ======
document.getElementById("manualLoc").addEventListener("click", function(e) {
  if (e.target.classList.contains("loc-btn")) {
    currentFilter = e.target.dataset.loc;
    updateFilterUI();
    document.getElementById("locStatus").textContent = "📍 " + e.target.textContent.trim();
    render();
  }
});

// ====== 获取位置 ======
if ("geolocation" in navigator) {
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userPos = [pos.coords.latitude, pos.coords.longitude];
      document.getElementById("locStatus").textContent =
        "📍 " + pos.coords.latitude.toFixed(4) + ", " + pos.coords.longitude.toFixed(4);
      // 自动切换到所在城市
      currentFilter = getCityFilter();
      updateFilterUI();
      render();
    },
    function(err) {
      document.getElementById("locStatus").textContent = "📍 无法获取位置，请手动选择区域";
      currentFilter = "all";
      updateFilterUI();
      render();
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
} else {
  document.getElementById("locStatus").textContent = "📍 浏览器不支持定位";
  currentFilter = "kl";
  render();
}

// ====== 筛选按钮 ======
document.getElementById("filterBar").addEventListener("click", function(e) {
  if (e.target.classList.contains("btn")) {
    currentFilter = e.target.dataset.filter;
    updateFilterUI();
    render();
  }
});

function updateFilterUI() {
  document.querySelectorAll(".filter-bar .btn").forEach(function(b) {
    b.classList.toggle("active", b.dataset.filter === currentFilter);
  });
}

// 给餐厅加上城市中文名
RESTAURANTS.forEach(function(r) {
  r.cityName = {kl:"吉隆坡", penang:"槟城", langkawi:"兰卡威"}[r.city] || "";
});
