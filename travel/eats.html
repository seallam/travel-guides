<!DOCTYPE html>

<head>

<title>附近美食 · 马来西亚</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f2eb;
  color: #333;
  padding-bottom: 80px;
}
.header {
  background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
  color: white;
  padding: 50px 16px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .loc { font-size: 12px; opacity: 0.7; margin-top: 4px; }
.manual-loc { display:flex; gap:4px; justify-content:center; flex-wrap:wrap; margin-top:8px; }
.manual-loc .btn {
  font-size:12px; padding:4px 14px; border-radius:12px;
  background:rgba(255,255,255,0.15); cursor:pointer;
  transition: all 0.2s;
}
.manual-loc .btn.active { background:rgba(255,255,255,0.35); font-weight:700; }
.container { max-width: 640px; margin: 0 auto; padding: 12px; }
.loading {
  text-align: center; padding: 60px 20px; color: #999;
}
.loading .spinner {
  width: 36px; height: 36px;
  border: 3px solid #ddd; border-top-color: #2d6a9f;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.card {
  background: white;
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  display: flex;
  gap: 12px;
  border-left: 4px solid #3c8dbc;
}
.card .icon { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; padding-top: 2px; }
.card .info { flex: 1; min-width: 0; }
.card .name { font-size: 15px; font-weight: 700; }
.card .name small { font-weight: 400; font-size: 12px; color: #888; margin-left: 4px; }
.card .addr { font-size: 12px; color: #888; margin-top: 2px; line-height: 1.4; }
.card .dist { font-size: 13px; color: #2d6a9f; font-weight: 600; margin-top: 3px; }
.card .btns { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.card .btns a {
  font-size: 12px; padding: 5px 14px; border-radius: 20px; text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px; font-weight: 500;
}
.card .nav-btn { background: #e8f4fd; color: #2d6a9f; }
.card .copy-btn { background: #f0ece4; color: #666; cursor: pointer; border: none; }
.card .price { font-size: 12px; color: #e67e22; font-weight: 600; margin-top: 3px; }
.card .tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.card .tags span {
  font-size: 11px; padding: 2px 8px; border-radius: 8px;
  background: #eef6fb; color: #2d6a9f;
}
.city-tag { font-size: 11px; padding: 1px 8px; border-radius: 8px; margin-left: 6px; }
.city-kl { background: #d6eaf8; color: #1a5276; }
.city-penang { background: #fdebd0; color: #a0670a; }
.city-langkawi { background: #e8daf5; color: #5b2c8a; }
.footer { text-align: center; padding: 20px; font-size: 12px; color: #999; }
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: white; padding: 10px 24px;
  border-radius: 24px; font-size: 14px; z-index: 999;
  opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>🍜 附近美食</h1>
  <div class="loc" id="locStatus">📍 定位中...</div>
  <div class="manual-loc" id="manualLoc">
    <span class="btn" data-loc="all">🌍 全部</span>
    <span class="btn" data-loc="kl">🗼 吉隆坡</span>
    <span class="btn" data-loc="penang">🍜 槟城</span>
    <span class="btn" data-loc="langkawi">⛵ 兰卡威</span>
  </div>
</div>

<div class="container" id="results">
  <div class="loading"><div class="spinner"></div>定位中...</div>
</div>

<div class="toast" id="toast"></div>
<div class="footer">📊 数据：小红书评分 · 点击导航直达</div>

// ====== 距离计算 ======
function deg2rad(d){return d*Math.PI/180}
function dist(lat1,lng1,lat2,lng2){
  var R=6371,dL=deg2rad(lat2-lat1),dG=deg2rad(lng2-lng1);
  var a=Math.sin(dL/2)**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

var userPos = null, currentFilter = "all";

function render() {
  var list = RESTAURANTS.filter(function(r) {
    return currentFilter === "all" || r.city === currentFilter;
  });

  list.forEach(function(r) {
    r.d = userPos ? dist(userPos[0],userPos[1],r.coord[0],r.coord[1]) : 999;
  });
  list.sort(function(a,b){return a.d-b.d});

  var html = "";
  list.forEach(function(r) {
    var d = userPos && r.d < 100
      ? '<span class="dist">'+(r.d<1?Math.round(r.d*1000)+'m':r.d.toFixed(1)+'km')+'</span>'
      : '';
    var cityL = {kl:"吉隆坡",penang:"槟城",langkawi:"兰卡威"}[r.city];
    var navUrl = "https://www.google.com/maps/dir/?api=1&destination="+r.coord[0]+","+r.coord[1];
    var cityClass = "city-"+r.city;

    html += '<div class="card">';
    html += '<div class="icon">'+r.icon+'</div>';
    html += '<div class="info">';
    html += '<div class="name">'+r.name+' <span class="city-tag '+cityClass+'">'+cityL+'</span></div>';
    html += '<div class="addr">📍 '+r.addr+'</div>';
    if(d) html += '<div class="dist">📏 距你 '+d+'</div>';
    html += '<div class="price">'+r.price+'</div>';
    html += '<div class="tags">'+r.tags.map(function(t){return '<span>'+t+'</span>'}).join('')+'</div>';
    html += '<div class="btns">';
    html += '<a class="nav-btn" href="'+navUrl+'" target="_blank">🗺️ 导航</a>';
    html += '<button class="copy-btn" onclick="copyAddr(\''+r.addr.replace(/'/g,"\\'")+'\',\''+r.name+'\')">📋 复制地址</button>';
    html += '</div></div></div>';
  });

  if(list.length===0) html='<div class="loading" style="padding:40px">该区域暂无餐厅</div>';
  document.getElementById("results").innerHTML = html;
}

function copyAddr(addr,name){
  var t=addr+', '+name;
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){
    showToast('✅ 已复制: '+t);
  })}else{showToast('📋 '+t)}
}

function showToast(msg){
  var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show")},2000);
}

// ====== 定位 ======
if("geolocation" in navigator){
  navigator.geolocation.getCurrentPosition(
    function(pos){
      userPos=[pos.coords.latitude,pos.coords.longitude];
      document.getElementById("locStatus").textContent="📍 GPS: "+pos.coords.latitude.toFixed(4)+", "+pos.coords.longitude.toFixed(4);
      autoFilter(); render();
    },function(){
      locateByIP();
    },{enableHighAccuracy:false,timeout:5000}
  );
}else{locateByIP();}

function locateByIP(){
  var x=new XMLHttpRequest();
  x.open("GET","https://ipapi.co/json/",true);
  x.onload=function(){
    try{
      var d=JSON.parse(x.responseText),c=(d.city||"").toLowerCase();
      if(c.indexOf("kuala")>-1||c.indexOf("kualalumpur")>-1){userPos=[3.148,101.705];currentFilter="kl"}
      else if(c.indexOf("penang")>-1||c.indexOf("george")>-1){userPos=[5.414,100.332];currentFilter="penang"}
      else if(c.indexOf("langkawi")>-1||c.indexOf("kuah")>-1){userPos=[6.293,99.727];currentFilter="langkawi"}
      else{currentFilter="all"}
      document.getElementById("locStatus").textContent="📍 IP: "+(d.city||"")+" · "+(d.country_name||"");
    }catch(e){currentFilter="all";document.getElementById("locStatus").textContent="📍 显示全部"}
    updateUI(); render();
  };
  x.onerror=function(){currentFilter="all";document.getElementById("locStatus").textContent="📍 显示全部";updateUI();render();};
  x.send();
}

function autoFilter(){
  if(!userPos)return;
  var dKL=dist(userPos[0],userPos[1],3.148,101.705);
  var dPN=dist(userPos[0],userPos[1],5.414,100.332);
  var dLGK=dist(userPos[0],userPos[1],6.293,99.727);
  var m=Math.min(dKL,dPN,dLGK);
  if(m<50){currentFilter=dKL===m?"kl":dPN===m?"penang":"langkawi"}else{currentFilter="all"}
  updateUI();
}

function updateUI(){
  document.querySelectorAll(".manual-loc .btn").forEach(function(b){
    b.classList.toggle("active",b.dataset.loc===currentFilter);
  });
}

document.getElementById("manualLoc").addEventListener("click",function(e){
  if(e.target.classList.contains("btn")){currentFilter=e.target.dataset.loc;updateUI();render()}
});
</script>
